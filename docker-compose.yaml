  mysql:
    image: mysql:8.0
    container_name: mysql
    volumes:
      - mysql_h:/var/lib/mysql
      - ./dataset:/tmp/dataset
      - ./load_dataset_into_mysql:/tmp/load_dataset
      - ./load_dataset_into_mysql/01_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
    ports:
      - "3307:3306"
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MLFLOW_DB_NAME}
      - MYSQL_ROOT_USER=root
      - MYSQL_USER=${MLFLOW_DB_USER}
      - MYSQL_PASSWORD=${MLFLOW_DB_PASS}
      - MYSQL_ROOT_PASSWORD=${MLFLOW_DB_ROOT_PASS}
    networks:
      - data_network
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --expire-logs-days=10
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MLFLOW_DB_ROOT_PASS}",
        ]
      interval: 3s
      timeout: 20s
      retries: 30
      start_period: 60s

  # Service load dữ liệu OLIST vào MySQL lần đầu tiên
  init-olist-data:
    image: python:3.11-slim
    container_name: init-olist-data
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dataset:/tmp/dataset
      - ./load_dataset_into_mysql:/app
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MLFLOW_DB_USER=root # Bắt buộc dùng root để có quyền ghi vào olist_db
      - MLFLOW_DB_ROOT_PASS=${MLFLOW_DB_ROOT_PASS}
      - DB_NAME=${DB_NAME}
    working_dir: /app
    command: >
      sh -c "
        pip install --quiet pandas sqlalchemy pymysql mysql-connector-python &&
        echo 'Đợi DNS resolution cho mysql...' &&
        sleep 30 &&
        python load_data.py
      "
    networks:
      - data_network

