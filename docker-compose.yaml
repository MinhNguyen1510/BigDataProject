

# --- CẤU HÌNH DÙNG CHUNG CHO AIRFLOW ---
x-airflow-common: &airflow-common
  build:
    context: ./docker_image/airflow
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: &airflow-common-env
    PYTHONPATH: /opt/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Ghép chuỗi kết nối Database từ các biến môi trường
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Cấu hình timezone (sửa lỗi offset-naive vs offset-aware datetimes)
    AIRFLOW__CORE__DEFAULT_TIMEZONE: "UTC"
    TZ: "UTC"
    # Session configuration - sử dụng database sessions thay vì cookies
    AIRFLOW__WEBSERVER__SESSION_BACKEND_PROVIDER: airflow.www.security.SessionPersistenceBackend
    AIRFLOW__WEBSERVER__SESSION_COOKIE_SAMESITE: "Lax"
    # Disable session expiry check lỗi
    PYTHONDONTWRITEBYTECODE: "1"

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config/webserver_config.py:/opt/airflow/webserver_config.py
    - ./etl:/opt/airflow/etl
  depends_on:
    - postgres
  networks:
    - data_network

services:
  minio:
    hostname: minio
    image: "minio/minio"
    container_name: minio
    ports:
      - "9001:9001"
      - "9000:9000"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - miniodata:/data
    env_file:
      - .env
    networks:
      - data_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  mc:
    image: minio/mc
    container_name: mc
    hostname: mc
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set minio http://minio:9000/ minio minio123) do echo '...waiting...' && sleep 10; done; /usr/bin/mc mb minio/mlflow; tail -f /dev/null;"
    depends_on:
      - minio
    networks:
      - data_network

  spark-master:
    build:
      context: ./docker_image/spark
      dockerfile: ./Dockerfile
    container_name: "spark-master"
    ports:
      - "7077:7077" # Spark master port
      - "8081:8080" # Spark master web UI port
    expose:
      - "7077"
    environment:
      # - SPARK_MODE=master
      # - SPARK_RPC_AUTHENTICATION_ENABLED=no
      # - SPARK_RPC_ENCRYPTION_ENABLED=no
      # - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      # - SPARK_SSL_ENABLED=no
      # - SPARK_USER=spark
      - SPARK_USER=spark
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./docker_image/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./docker_image/spark/conf/log4j.properties:/opt/spark/conf/log4j.properties
      - ./etl:/opt/airflow/etl
    networks:
      - data_network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master

  spark-worker:
    build:
      context: ./docker_image/spark
      dockerfile: ./Dockerfile
    container_name: "spark-worker"
    depends_on:
      - spark-master
    environment:
      - SPARK_USER=spark
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - ./docker_image/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./docker_image/spark/conf/log4j.properties:/opt/spark/conf/log4j.properties
      - ./etl:/opt/airflow/etl
    networks:
      - data_network
    # Chỉ định lệnh chạy Worker và trỏ về node Master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8082:8081"

